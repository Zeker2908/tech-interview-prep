spring:
  application:
    name: sandbox-service
  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}
    admin:
      properties:
        offsets.topic.replication-factor: 1
        transactions.state.log.replication-factor: 1
        transactions.state.log.min.isr: 1
      auto-create: true

feign:
  client:
    config:
      judge0:
        connectTimeout: 2000
        readTimeout: 10000

logging:
  level:
    root: INFO
    ru.zeker: DEBUG

server:
  port: 8085
